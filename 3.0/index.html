<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Hero Vote - Comic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --marvel-red: #ed1d24;
            --marvel-blue: #003399;
            --marvel-yellow: #feca05;
            --paper-color: #f0f0f0;
            --black: #000000;
        }

        body {
            background-color: var(--marvel-blue);
            background-image: radial-gradient(var(--black) 15%, transparent 16%),
                              radial-gradient(var(--black) 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        #app {
            max-width: 900px;
            margin: 0 auto;
            background: var(--paper-color);
            padding: 40px;
            border: 6px solid var(--black);
            box-shadow: 15px 15px 0 var(--black);
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 5px solid var(--black);
            margin-bottom: 40px;
            padding-bottom: 20px;
            transform: rotate(-1deg);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 5rem;
            margin: 0;
            color: white;
            text-shadow: 4px 4px 0 var(--black), -2px -2px 0 var(--black), 2px -2px 0 var(--black), -2px 2px 0 var(--black);
            background: var(--marvel-red);
            display: inline-block;
            padding: 10px 30px;
            border: 4px solid var(--black);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.5rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 10px;
        }

        .vote-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .hero-card {
            background: white;
            border: 4px solid var(--black);
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .hero-card:hover {
            transform: scale(1.05) rotate(2deg);
            z-index: 10;
        }

        .hero-card h2 {
            font-family: 'Bangers', cursive;
            font-size: 2.2rem;
            margin: 15px 0;
            background: var(--marvel-yellow);
            border: 2px solid var(--black);
            padding: 10px 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vote-button {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            background: var(--marvel-red);
            color: white;
            border: 3px solid var(--black);
            padding: 15px 20px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 var(--black);
        }

        .vote-button:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .vote-count {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.4rem;
        }

        .count {
            font-size: 2rem;
            color: var(--marvel-blue);
        }

        #results {
            background: var(--marvel-yellow);
            border: 4px solid var(--black);
            padding: 20px;
            transform: rotate(1deg);
        }

        #results h2 {
            font-family: 'Bangers', cursive;
            text-align: center;
            font-size: 2.5rem;
            margin-top: 0;
        }

        #rank-list {
            list-style: none;
            padding: 0;
            font-size: 1.4rem;
        }

        #rank-list li {
            border-bottom: 2px dashed var(--black);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .ironman { border-bottom: 10px solid #AA0000; }
        .captain { border-bottom: 10px solid #0000FF; }
        .thor { border-bottom: 10px solid #777777; }
        .spiderman { border-bottom: 10px solid #FF0000; }

    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>HERO VOTE!</h1>
            <p>Choose Your Favorite Avenger!</p>
        </header>

        <main>
            <section class="vote-container">
                <article class="hero-card ironman">
                    <h2>Iron Man</h2>
                    <button class="vote-button" onclick="vote('ironman')">VOTE!</button>
                    <p class="vote-count">POW! <span id="count-ironman" class="count">0</span></p>
                </article>

                <article class="hero-card captain">
                    <h2>Captain</h2>
                    <button class="vote-button" onclick="vote('captain')">VOTE!</button>
                    <p class="vote-count">BAM! <span id="count-captain" class="count">0</span></p>
                </article>

                <article class="hero-card thor">
                    <h2>Thor</h2>
                    <button class="vote-button" onclick="vote('thor')">VOTE!</button>
                    <p class="vote-count">ZAP! <span id="count-thor" class="count">0</span></p>
                </article>

                <article class="hero-card spiderman">
                    <h2>Spidey</h2>
                    <button class="vote-button" onclick="vote('spiderman')">VOTE!</button>
                    <p class="vote-count">THWIP! <span id="count-spiderman" class="count">0</span></p>
                </article>
            </section>
        </main>

        <aside id="results">
            <h2>Current Standings</h2>
            <ul id="rank-list">
            </ul>
        </aside>

        <footer>
            <p>&copy; 2024 MARVEL FAN PROJECT. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <script>
        const votes = {
            ironman: 0,
            captain: 0,
            thor: 0,
            spiderman: 0
        };

        const heroNames = {
            ironman: 'Iron Man',
            captain: 'Captain America',
            thor: 'Thor',
            spiderman: 'Spider-Man'
        };

        function vote(heroId) {
            votes[heroId]++;
            document.getElementById('count-' + heroId).innerText = votes[heroId];
            updateRankings();
        }

        function updateRankings() {
            const rankList = document.getElementById('rank-list');
            const sortedHeroes = Object.keys(votes).sort((a, b) => votes[b] - votes[a]);
            
            rankList.innerHTML = '';
            sortedHeroes.forEach((heroId, index) => {
                const li = document.createElement('li');
                li.innerHTML = '<span>#' + (index + 1) + ' ' + heroNames[heroId] + '</span> <span>' + votes[heroId] + ' VOTES</span>';
                rankList.appendChild(li);
            });
        }

        updateRankings();
    </script>
</body>
</html>
