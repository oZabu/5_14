<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Hero Vote - Dynamic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --marvel-red: #ed1d24;
            --marvel-blue: #003399;
            --marvel-yellow: #feca05;
            --paper-color: #f0f0f0;
            --black: #000000;
        }

        body {
            background-color: var(--marvel-blue);
            background-image: radial-gradient(var(--black) 15%, transparent 16%),
                radial-gradient(var(--black) 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        #app {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--paper-color);
            padding: 40px;
            border: 6px solid var(--black);
            box-shadow: 15px 15px 0 var(--black);
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 5px solid var(--black);
            margin-bottom: 40px;
            padding-bottom: 20px;
            transform: rotate(-1deg);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 5rem;
            margin: 0;
            color: white;
            text-shadow: 4px 4px 0 var(--black), -2px -2px 0 var(--black), 2px -2px 0 var(--black), -2px 2px 0 var(--black);
            background: var(--marvel-red);
            display: inline-block;
            padding: 10px 30px;
            border: 4px solid var(--black);
            letter-spacing: 2px;
        }

        .add-hero-section {
            background: white;
            border: 4px solid var(--black);
            padding: 20px;
            margin-bottom: 40px;
            transform: rotate(0.5deg);
            box-shadow: 8px 8px 0 var(--black);
        }

        .add-hero-section h2 {
            font-family: 'Bangers', cursive;
            margin-top: 0;
            font-size: 2rem;
            color: var(--marvel-red);
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="color"] {
            border: 3px solid var(--black);
            padding: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
        }

        input[type="text"] {
            flex-grow: 1;
        }

        .add-button {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            background: var(--marvel-yellow);
            border: 3px solid var(--black);
            padding: 5px 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--black);
        }

        .add-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--black);
        }

        .vote-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .hero-card {
            background: white;
            border: 4px solid var(--black);
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hero-card:hover {
            transform: scale(1.05) rotate(2deg);
            z-index: 10;
        }

        .hero-card h2 {
            font-family: 'Bangers', cursive;
            font-size: 2.2rem;
            margin: 15px 0;
            background: var(--marvel-yellow);
            border: 2px solid var(--black);
            padding: 10px 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vote-button {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            background: var(--marvel-red);
            color: white;
            border: 3px solid var(--black);
            padding: 15px 20px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 var(--black);
        }

        .vote-button:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 var(--black);
        }

        .vote-count {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.4rem;
        }

        .count {
            font-size: 2rem;
            color: var(--marvel-blue);
        }

        #results {
            background: var(--marvel-yellow);
            border: 4px solid var(--black);
            padding: 20px;
            transform: rotate(1deg);
        }

        #results h2 {
            font-family: 'Bangers', cursive;
            text-align: center;
            font-size: 2.5rem;
            margin-top: 0;
        }

        #rank-list {
            list-style: none;
            padding: 0;
            font-size: 1.4rem;
        }

        #rank-list li {
            border-bottom: 2px dashed var(--black);
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <h1>HERO VOTE!</h1>
            <p>Assemble Your Team and Vote!</p>
        </header>

        <section class="add-hero-section">
            <h2>JOIN THE AVENGERS!</h2>
            <div class="form-group">
                <input type="text" id="new-hero-name" placeholder="Hero Name (e.g. Hulk)">
                <input type="color" id="new-hero-color" value="#ed1d24">
                <button class="add-button" onclick="addHero()">RECRUIT!</button>
            </div>
        </section>

        <main>
            <section id="hero-container" class="vote-container">
                <!-- Dynamic Content -->
            </section>
        </main>

        <aside id="results">
            <h2>Current Standings</h2>
            <ul id="rank-list">
            </ul>
        </aside>

        <footer>
            <p>&copy; MARVEL Hero Vote - Dynamic Edition</p>
        </footer>
    </div>

    <script>
        async function fetchHeroes() {
            try {
                const response = await fetch('/heroes?t=' + Date.now());
                const heroes = await response.json();
                console.log('Fetched heroes:', heroes);
                renderHeroes(heroes);
                updateRankings(heroes);
            } catch (error) {
                console.error('Error loading heroes:', error);
            }
        }

        function renderHeroes(heroes) {
            const container = document.getElementById('hero-container');
            container.innerHTML = '';

            heroes.forEach(hero => {
                const card = document.createElement('article');
                card.className = 'hero-card';
                card.style.borderBottom = `10px solid ${hero.color}`;
                
                card.innerHTML = `
                    <h2>${hero.name}</h2>
                    <button class="vote-button" onclick="vote('${hero.id}')">VOTE!</button>
                    <p class="vote-count">POW! <span id="count-${hero.id}" class="count">${hero.count}</span></p>
                `;
                container.appendChild(card);
            });
        }

        async function vote(heroId) {
            try {
                const response = await fetch('/vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ option: heroId })
                });

                if (response.ok) {
                    await fetchHeroes();
                } else {
                    alert('Vote failed!');
                }
            } catch (error) {
                console.error('Error voting:', error);
            }
        }

        async function addHero() {
            const nameInput = document.getElementById('new-hero-name');
            const colorInput = document.getElementById('new-hero-color');
            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (!name) return alert('Enter a hero name!');

            try {
                const response = await fetch('/heroes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color })
                });

                if (response.ok) {
                    nameInput.value = '';
                    await fetchHeroes();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to add hero!');
                }
            } catch (error) {
                console.error('Error adding hero:', error);
            }
        }

        function updateRankings(heroes) {
            const rankList = document.getElementById('rank-list');
            
            const sortedHeroes = [...heroes].sort((a, b) => b.count - a.count);

            rankList.innerHTML = '';
            sortedHeroes.forEach((hero, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>#${index + 1} ${hero.name}</span> <span>${hero.count} VOTES</span>`;
                rankList.appendChild(li);
            });
        }

        // Initial Load
        fetchHeroes();
    </script>
</body>

</html>
